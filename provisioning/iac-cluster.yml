---
cluster_name: iac-cluster
kubeconfig_path: "./kubeconfig"
k3s_version: v1.35.0+k3s3

networking:
  ssh:
    port: 22
    use_agent: false
    public_key_path: "~/.ssh/id_ed25519.pub"
    private_key_path: "~/.ssh/id_ed25519"
  allowed_networks:
    ssh:
      - 0.0.0.0/0
    api:
      - 0.0.0.0/0
  public_network:
    ipv4: true
    ipv6: true
  private_network:
    enabled: true
    subnet: 10.0.0.0/16
  cni:
    enabled: true
    encryption: false
    mode: flannel

datastore:
  mode: etcd

schedule_workloads_on_masters: false

masters_pool:
  instance_type: cax11
  instance_count: 1
  locations:
    - nbg1

worker_node_pools:
  - name: worker-nodes-arm
    instance_type: cax11
    location: nbg1
    autoscaling:
      enabled: true
      min_instances: 0
      max_instances: 4

  - name: server-nodes-small-shared
    instance_type: cax11
    location: fsn1
    labels:
      - key: instanceType
        value: shared
    taints:
      - key: nodeType
        value: mc-server-node:NoSchedule
    autoscaling:
      enabled: true
      min_instances: 0
      max_instances: 4
  - name: server-nodes-medium-shared
    instance_type: cax21
    location: fsn1
    labels:
      - key: instanceType
        value: shared
    taints:
      - key: nodeType
        value: mc-server-node:NoSchedule
    autoscaling:
      enabled: true
      min_instances: 0
      max_instances: 4
  - name: server-nodes-large-shared
    instance_type: cax31
    location: fsn1
    labels:
      - key: instanceType
        value: shared
    taints:
      - key: nodeType
        value: mc-server-node:NoSchedule
    autoscaling:
      enabled: true
      min_instances: 0
      max_instances: 4

embedded_registry_mirror:
  enabled: false

create_load_balancer_for_the_kubernetes_api: false

k3s_upgrade_concurrency: 1
