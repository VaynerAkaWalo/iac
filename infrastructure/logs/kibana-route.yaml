apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kibana-route
  namespace: observability
spec:
  parentRefs:
    - name: envoy-gateway
      sectionName: https
      kind: Gateway
      namespace: infra

  hostnames:
    - kibana.blamedevs.com

  rules:
    - backendRefs:
        - name: kibana-kb-http
          port: 5601
