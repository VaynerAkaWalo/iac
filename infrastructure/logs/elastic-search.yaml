apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elastic-search
  namespace: observability
spec:
  version: 9.3.0
  nodeSets:
    - name: logs
      count: 1
      podTemplate:
        spec:
          volumes:
            - name: elasticsearch-data
              emptyDir: {}
      config:
        node.store.allow_mmap: false
